<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blomidentifierare 🌸</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#6dd5ed,#2193b0);
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
background:white;
color:#333;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
text-align:center;
width:420px;
}

h1{
margin-bottom:20px;
}

input{
margin-top:15px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#2193b0;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#176f85;
}

img{
margin-top:20px;
max-width:100%;
border-radius:12px;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.loading{
margin-top:10px;
font-size:14px;
color:gray;
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Blomidentifierare</h1>

<p>Ladda upp en bild på en blomma</p>

<input type="file" id="imageUpload" accept="image/*">

<br>

<button onclick="predict()">Identifiera blomma</button>

<div class="loading" id="loading"></div>

<img id="preview">

<div class="result" id="result"></div>

</div>

<script>

let model;

const classNames = [
"daisy",
"dandelion",
"rose",
"sunflower",
"tulip"
];

async function loadModel(){
document.getElementById("loading").innerText="Laddar AI-modell...";
model = await tf.loadLayersModel("model.json");
document.getElementById("loading").innerText="Modellen laddad ✔";
}

loadModel();

document.getElementById("imageUpload").addEventListener("change",function(event){

const reader = new FileReader();

reader.onload = function(){
document.getElementById("preview").src = reader.result;
}

reader.readAsDataURL(event.target.files[0]);

});

async function predict(){

const img = document.getElementById("preview");

if(!img.src){
alert("Ladda upp en bild först");
return;
}

document.getElementById("loading").innerText="Analyserar bild...";

let tensor = tf.browser.fromPixels(img)
.resizeNearestNeighbor([224,224])
.toFloat()
.div(255)
.expandDims();

let prediction = await model.predict(tensor).data();

let max = Math.max(...prediction);
let index = prediction.indexOf(max);

let flower = classNames[index];
let confidence = (max*100).toFixed(2);

document.getElementById("result").innerHTML =
`🌼 Resultat: <b>${flower}</b><br> Säkerhet: ${confidence}%`;

document.getElementById("loading").innerText="";

}

</script>

</body>
</html>
