<!DOCTYPE html>
<html lang="sv">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Blomidentifierare</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.card{

width:420px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.3);

}

h1{
margin-bottom:10px;
}

.upload{

border:2px dashed rgba(255,255,255,0.5);
padding:20px;
border-radius:12px;
cursor:pointer;
margin-bottom:20px;
}

input{
display:none;
}

img{
width:100%;
border-radius:12px;
display:none;
margin-top:10px;
}

button{

margin-top:15px;
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;

}

button:hover{
transform:scale(1.05);
}

.loading{
margin-top:15px;
font-size:14px;
opacity:0.8;
}

.result{
margin-top:20px;
text-align:left;
}

.bar{

height:8px;
background:rgba(255,255,255,0.3);
border-radius:10px;
overflow:hidden;

}

.fill{
height:100%;
background:white;
}

</style>

</head>

<body>

<div class="card">

<h1>🌸 AI Blomidentifierare</h1>
<p>Ladda upp en blomma</p>

<label class="upload">

<input type="file" id="fileInput" accept="image/*">

📷 Klicka för att välja bild

</label>

<img id="preview">

<button onclick="predict()">Identifiera</button>

<div class="loading" id="status">Laddar modell...</div>

<div class="result" id="results"></div>

</div>

<script>

let model;

const classes = [
"daisy",
"dandelion",
"rose",
"sunflower",
"tulip"
];

async function loadModel(){

try{

model = await tf.loadLayersModel("./model.json");

document.getElementById("status").innerText="Modell laddad ✔";

}catch(err){

document.getElementById("status").innerText="Kunde inte ladda modellen!";
console.error(err);

}

}

loadModel();

const fileInput=document.getElementById("fileInput");
const preview=document.getElementById("preview");

fileInput.addEventListener("change",(event)=>{

const file=event.target.files[0];

if(!file) return;

preview.src=URL.createObjectURL(file);
preview.style.display="block";

});

async function predict(){

if(!model){
alert("Modellen är inte laddad ännu");
return;
}

if(!preview.src){
alert("Välj en bild först");
return;
}

document.getElementById("status").innerText="Analyserar bild...";

const tensor = tf.browser.fromPixels(preview)
.resizeBilinear([224,224])
.toFloat()
.div(255)
.expandDims(0);

const predictions = await model.predict(tensor).data();

let results=[];

predictions.forEach((p,i)=>{

results.push({
name:classes[i],
prob:p
});

});

results.sort((a,b)=>b.prob-a.prob);

let html="";

for(let i=0;i<3;i++){

let percent=(results[i].prob*100).toFixed(1);

html+=`
<div>

<strong>${results[i].name}</strong> ${percent}%

<div class="bar">
<div class="fill" style="width:${percent}%"></div>
</div>

</div>
`;

}

document.getElementById("results").innerHTML=html;

document.getElementById("status").innerText="";

}

</script>

</body>
</html>
