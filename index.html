<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Blomidentifierare</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
    margin:40px;
}

h1{
    color:#2c3e50;
}

.container{
    background:white;
    padding:25px;
    border-radius:10px;
    max-width:600px;
    margin:auto;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

#statusBox{
    background:#eef2ff;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
    font-weight:bold;
}

#preview{
    margin-top:15px;
    max-width:250px;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

.footer{
    margin-top:30px;
    color:#555;
}
</style>
</head>

<body>

<div class="container">

<h1>Blomidentifierare 🌸</h1>

<div id="statusBox">Status: Laddar modell...</div>

<input type="file" id="imageUpload" accept="image/*">

<br>

<img id="preview">

<div id="result"></div>

<div class="footer">
Skapad av <b>Tilde</b> – Klass <b>NA23A</b>
</div>

</div>

<script>

let model;
const statusBox = document.getElementById("statusBox");

const classNames = [
"tulpan",
"ros",
"maskros",
"solros",
"prästkrage"
];

// Ladda modell
async function loadModel(){

    try{

        model = await tf.loadLayersModel("tfjs_model/model.json");

        statusBox.innerText = "Status: Modell laddad ✅";

    }
    catch(error){

        statusBox.innerText = "Status: Kunde inte ladda modellen ❌";

        console.error(error);

    }

}

loadModel();


// När användaren laddar upp bild
document.getElementById("imageUpload").addEventListener("change", async function(event){

    const file = event.target.files[0];

    const img = document.getElementById("preview");

    img.src = URL.createObjectURL(file);

    img.onload = async function(){

        if(!model){
            alert("Modellen är inte laddad än.");
            return;
        }

        predict(img);

    };

});


// Gör prediction
async function predict(image){

    const tensor = tf.browser.fromPixels(image)
        .resizeNearestNeighbor([224,224])
        .toFloat()
        .expandDims();

    const prediction = model.predict(tensor);

    const data = await prediction.data();

    let maxIndex = 0;

    for(let i=0;i<data.length;i++){
        if(data[i] > data[maxIndex]){
            maxIndex = i;
        }
    }

    const probability = (data[maxIndex]*100).toFixed(2);

    document.getElementById("result").innerHTML =
        "Blomma: <b>"+classNames[maxIndex]+"</b><br>Sannolikhet: "+probability+"%";

}

</script>

</body>
</html>
