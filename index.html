<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Blomidentifierare</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{

width:420px;
padding:35px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
border-radius:20px;

box-shadow:
0 10px 40px rgba(0,0,0,0.3);

text-align:center;
}

h1{
font-weight:600;
margin-bottom:10px;
}

p{
font-size:14px;
opacity:0.9;
margin-bottom:20px;
}

.upload-area{

border:2px dashed rgba(255,255,255,0.5);
border-radius:15px;
padding:30px;
cursor:pointer;
transition:0.3s;
}

.upload-area:hover{
background:rgba(255,255,255,0.1);
}

.upload-area span{
font-size:14px;
opacity:0.8;
}

input{
display:none;
}

img{

margin-top:20px;
width:100%;
border-radius:12px;
display:none;

}

button{

margin-top:20px;
padding:12px 28px;

border:none;
border-radius:30px;

background:white;
color:#333;

font-weight:600;

cursor:pointer;

transition:0.25s;
}

button:hover{

transform:scale(1.05);
}

.results{

margin-top:25px;
text-align:left;

}

.result-item{

margin-bottom:12px;

}

.bar{

height:8px;
border-radius:10px;
background:rgba(255,255,255,0.3);
margin-top:4px;
overflow:hidden;

}

.bar-fill{

height:100%;
background:white;

}

.loading{

margin-top:15px;
font-size:13px;
opacity:0.8;

}

.footer{

margin-top:20px;
font-size:12px;
opacity:0.6;

}

</style>

</head>

<body>

<div class="container">

<h1>🌸 AI Blomidentifierare</h1>
<p>Ladda upp en blomma och låt AI identifiera den</p>

<label class="upload-area">

<input type="file" id="imageUpload" accept="image/*">

<span>📷 Klicka eller dra en bild hit</span>

</label>

<img id="preview">

<button onclick="predict()">Identifiera</button>

<div class="loading" id="loading"></div>

<div class="results" id="results"></div>

<div class="footer">
AI Flower Classifier
</div>

</div>

<script>

let model;

const classNames=[
"daisy",
"dandelion",
"rose",
"sunflower",
"tulip"
];

async function loadModel(){

document.getElementById("loading").innerText="Laddar AI-modell...";

model=await tf.loadLayersModel("model.json");

document.getElementById("loading").innerText="Modell laddad ✔";

}

loadModel();

const upload=document.getElementById("imageUpload");
const preview=document.getElementById("preview");

upload.addEventListener("change",function(e){

const reader=new FileReader();

reader.onload=function(){

preview.src=reader.result;
preview.style.display="block";

}

reader.readAsDataURL(e.target.files[0]);

});

async function predict(){

if(!preview.src){

alert("Ladda upp en bild först");
return;

}

document.getElementById("loading").innerText="Analyserar bild...";

let tensor=tf.browser.fromPixels(preview)
.resizeNearestNeighbor([224,224])
.toFloat()
.div(255)
.expandDims();

let prediction=await model.predict(tensor).data();

let results=[];

prediction.forEach((p,i)=>{

results.push({
name:classNames[i],
prob:p
})

});

results.sort((a,b)=>b.prob-a.prob);

let html="";

for(let i=0;i<3;i++){

let percent=(results[i].prob*100).toFixed(1);

html+=`

<div class="result-item">

<strong>${results[i].name}</strong>
${percent}%

<div class="bar">
<div class="bar-fill" style="width:${percent}%"></div>
</div>

</div>

`;

}

document.getElementById("results").innerHTML=html;

document.getElementById("loading").innerText="";

}

</script>

</body>
</html>
